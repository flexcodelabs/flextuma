spring.application.name=flextuma

spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:10}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:5}
spring.datasource.hikari.idle-timeout=${HIKARI_IDLE_TIMEOUT:300000}
spring.datasource.hikari.connection-timeout=${HIKARI_CONN_TIMEOUT:20000}
logging.config=classpath:logback-spring.xml
spring.output.ansi.enabled=ALWAYS
spring.devtools.restart.enabled=true

spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.repositories.enabled=false

server.servlet.session.timeout=${SESSION_TIMEOUT:30m}

spring.jpa.open-in-view=${JPA_OPEN_IN_VIEW:false}
spring.jpa.database-platform=${JPA_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}

spring.jpa.properties.hibernate.default_batch_fetch_size=${BATCH_SIZE:100}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
logging.level.org.hibernate.SQL=${HIBERNATE_SQL_LEVEL:DEBUG}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${HIBERNATE_BINDER_LEVEL:DEBUG}
logging.level.org.springframework.orm.jpa=${JPA_LEVEL:DEBUG}
logging.level.org.springframework.transaction=${TRANSACTION_LEVEL:DEBUG}
logging.level.org.hibernate.engine.jdbc.spi.SqlExceptionHelper=${SQL_EXCEPTION_HELPER_LEVEL:DEBUG}

# Additional JPA debugging
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
logging.level.org.hibernate.tool.hbm2ddl=DEBUG
logging.level.org.hibernate.schema=DEBUG

# Disable verbose Spring exception resolver logs
logging.level.org.springframework.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver=WARN

# Disable Hibernate constraint violation warnings
logging.level.org.hibernate.orm.jdbc.warn=${HIBERNATE_JDBC_WARN_LEVEL:ERROR}

# Clean up Spring Boot logging format
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n

# Disable specific verbose loggers
logging.level.org.apache.catalina.core=WARN
logging.level.org.apache.catalina=WARN
logging.level.org.springframework.boot=WARN
logging.level.org.springframework.web=WARN

spring.web.error.include-message=${ERROR_INCLUDE_MESSAGE:always}

# SMS Pricing
flextuma.sms.price-per-segment=${SMS_PRICE_PER_SEGMENT:20.0}

# App Upload Directories
flextuma.app.upload.directory=${APP_UPLOAD_DIRECTORY:/tmp/apps}
flextuma.app.frontend.directory=${APP_FRONTEND_DIRECTORY:/tmp/frontend}

# Frontend Static Files - Completely disabled to use custom FrontendController
spring.web.resources.add-mappings=false
spring.web.resources.static-locations=
spring.mvc.static-path-pattern=/**

# System Logging
flextuma.logging.min-level=${LOG_MIN_LEVEL:WARN}
flextuma.logging.retention-days=${LOG_RETENTION_DAYS:30}
flextuma.logging.batch-size=${LOG_BATCH_SIZE:50}
flextuma.logging.flush-interval-ms=${LOG_FLUSH_INTERVAL:2000}